name: Deploy PRE → PROD

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID del despliegue DEV→PRE (número de la URL: .../actions/runs/XXXXXX)"
        required: true

env:
  SOLUTION_NAME: ConversationalAgent

jobs:
  deploy:
    name: Download DEV→PRE artifact and import to PROD
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Get source run number
        id: source_run
        run: |
          RUN_NUMBER=$(gh api repos/${{ github.repository }}/actions/runs/${{ inputs.source_run_id }} --jq '.run_number')
          echo "run_number=$RUN_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download solution artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SOLUTION_NAME }}-${{ steps.source_run.outputs.run_number }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Validate connection to PROD
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}

      - name: Import solution to PROD
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}
          solution-file: out/${{ env.SOLUTION_NAME }}.zip
          force-overwrite: true
          publish-changes: true

      - name: Tag deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "deploy/prod/1.0.1.${{ steps.source_run.outputs.run_number }}"
          git push origin "deploy/prod/1.0.1.${{ steps.source_run.outputs.run_number }}"

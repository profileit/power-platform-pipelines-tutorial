name: Deploy PRE → PROD

on:
  workflow_dispatch:
    inputs:
      pre_tag:
        description: "Tag del despliegue a PRE (ej: deploy/pre/1.0.1.5)"
        required: true

env:
  SOLUTION_NAME: ConversationalAgent

jobs:
  deploy:
    name: Promote PRE tag to PROD
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Install PAC CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Resolve run ID from tag
        id: resolve
        run: |
          TAG="${{ inputs.pre_tag }}"
          RUN_NUMBER="${TAG##*.}"
          echo "run_number=$RUN_NUMBER" >> $GITHUB_OUTPUT

          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/deploy-dev-to-pre.yml/runs?per_page=100" \
            --jq ".workflow_runs[] | select(.run_number == ($RUN_NUMBER | tonumber)) | .id" | head -1)

          if [ -z "$RUN_ID" ]; then
            echo "No se encontró ningún run con número $RUN_NUMBER en el workflow DEV→PRE"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download solution artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SOLUTION_NAME }}-${{ steps.resolve.outputs.run_number }}
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Validate connection to PROD
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}

      - name: Import solution to PROD
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}
          solution-file: out/${{ env.SOLUTION_NAME }}.zip
          force-overwrite: true
          publish-changes: true

      - name: Tag deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ inputs.pre_tag }}"
          VERSION="${VERSION/deploy\/pre\//}"
          git tag "deploy/prod/$VERSION"
          git push origin "deploy/prod/$VERSION"
